<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts PWA - Listado</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Contacts PWA</h1>
        <p id="tokenInfo" class="muted">Sin información de sesión.</p>
      </div>
      <div class="actions">
        <button id="refreshTokenBtn">Refrescar token</button>
        <button id="logoutBtn" class="danger">Logout</button>
      </div>
    </header>

    <main class="container wide">
      <section class="card">
        <h2>Agregar contacto</h2>
        <div class="grid two">
          <div>
            <label for="nombre">Nombre</label>
            <input id="nombre" type="text" placeholder="Nombre" />
          </div>
          <div>
            <label for="telefono">Teléfono</label>
            <input id="telefono" type="text" placeholder="Teléfono" />
          </div>
        </div>

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Email (opcional)" />

        <div class="actions">
          <button id="addBtn" class="primary">Agregar</button>
          <button id="loadBtn">Refrescar lista</button>
        </div>

        <p id="status" class="status">Listo para trabajar con contactos.</p>
      </section>

      <section class="card">
        <h2>Listado de contactos</h2>
        <div id="list" class="list"></div>
      </section>
    </main>

    <script type="module" src="./contacts.js"></script>
  </body>
</html>
